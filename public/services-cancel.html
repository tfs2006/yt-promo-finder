<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout Canceled | Social Services</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <script src="/nav.js" defer></script>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/tailwind.css">
  <style>
    .glass-effect { background: rgba(15, 23, 42, 0.62); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-2xl mx-auto px-4 py-12">
    <section class="glass-effect border border-amber-700/40 rounded-2xl p-6 sm:p-8">
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/30 text-amber-200 text-xs uppercase tracking-wide mb-4">
        Checkout canceled
      </div>
      <h1 class="text-3xl font-bold">No charge was made.</h1>
      <p class="text-slate-300 mt-3">
        Your checkout was canceled before payment. You can return to the services page and try again any time.
      </p>

      <div class="mt-6 flex flex-col sm:flex-row gap-3">
        <a href="/services" class="rounded-lg bg-slate-200 text-slate-900 px-4 py-2.5 text-center font-medium hover:bg-white transition">Return to services</a>
        <a href="/" class="rounded-lg border border-slate-700 px-4 py-2.5 text-center hover:bg-slate-800 transition">Go to homepage</a>
      </div>
    </section>
  </main>
</body>
</html>
